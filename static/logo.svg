<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Definitions -->
  <defs>
    <linearGradient id="gradientLaranja" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E85A2C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradientAzul" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A2A3A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F1A28;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="250" fill="url(#gradientAzul)" filter="url(#shadow)"/>
  
  <!-- Outer Ring (Laranja) -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#gradientLaranja)" stroke-width="8"/>
  
  <!-- Letter B - Left Side (Laranja) -->
  <path d="M 140 180 L 140 340 Q 140 360 160 360 L 200 360 Q 230 360 230 330 L 230 310 Q 230 290 210 290 L 160 290 M 160 290 L 200 290 Q 230 290 230 260 L 230 240 Q 230 210 200 210 L 160 210 L 160 180" 
        fill="none" stroke="url(#gradientLaranja)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Letter O - Middle (Laranja + Azul) -->
  <circle cx="310" cy="270" r="70" fill="none" stroke="url(#gradientLaranja)" stroke-width="16"/>
  <circle cx="310" cy="270" r="45" fill="url(#gradientAzul)" opacity="0.3"/>
  
  <!-- Letter N - Right Side (Azul) -->
  <path d="M 380 180 L 380 340 M 380 180 L 430 340 M 430 340 L 430 180" 
        fill="none" stroke="url(#gradientLaranja)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Decorative elements - Top Stars -->
  <g opacity="0.8">
    <circle cx="120" cy="80" r="6" fill="url(#gradientLaranja)"/>
    <circle cx="392" cy="60" r="5" fill="url(#gradientLaranja)"/>
    <circle cx="460" cy="140" r="6" fill="url(#gradientLaranja)"/>
  </g>
  
  <!-- Decorative elements - Bottom Accent -->
  <g opacity="0.6">
    <rect x="200" y="400" width="112" height="8" rx="4" fill="url(#gradientLaranja)"/>
  </g>
  
  <!-- Center Dot (Interactive element) -->
  <circle cx="256" cy="256" r="4" fill="url(#gradientLaranja)"/>
</svg>
